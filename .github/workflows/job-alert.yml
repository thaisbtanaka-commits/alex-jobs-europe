name: Job Alert Automation

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  send-alert:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install nodemailer

      - name: Run job alert script
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DEST_EMAIL: ${{ secrets.DEST_EMAIL }}
          THEIRSTACK_API_KEY: ${{ secrets.THEIRSTACK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node send-alert.mjs

      - name: Commit sent-jobs.json
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add sent-jobs.json
          git commit -m "Update sent jobs: $(date)" || true
          git push || true

      - name: Keep repo alive
        if: always()
        run: |
          echo "$(date)" > last-run.txt
          git add last-run.txt
          git commit -m "Keep-alive: $(date)" || true
          git push || true
